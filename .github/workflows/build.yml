name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      app_version: ${{ steps.release_meta.outputs.app_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    env:
      # GitHub-hosted runners occasionally hit crates.io HTTP/2 stream
      # resets while downloading large dependency graphs. Cargo retries plus
      # HTTP/1.1 transport make release builds less flaky across the matrix.
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "5"
      CARGO_HTTP_TIMEOUT: "60"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          # xdg-utils provides /usr/bin/xdg-open, which Tauri's
          # AppImage bundler embeds into the produced AppImage.
          # Pre-installed on the x86_64 runner image but NOT on
          # the ARM64 image — list it explicitly so both arches
          # bundle cleanly regardless of future image drift.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler xdg-utils

      - name: Install protoc (Windows)
        if: matrix.platform == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare MCP server resources
        run: |
          npm --prefix mcp-server ci
          npm run mcp:build

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag-triggered: use the tag name as-is.
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=LLM Wiki ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: create a dated pre-release so artifacts
            # always land on the Releases page and don't collide across runs.
            TS="$(date -u +%Y%m%d-%H%M%S)"
            echo "tag_name=v${APP_VERSION}-preview-${TS}" >> "$GITHUB_OUTPUT"
            echo "release_name=LLM Wiki v${APP_VERSION} (preview ${TS})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing is skipped — no Apple secrets are
          # configured in this repo.  To enable, add the six
          # APPLE_* secrets in Settings → Secrets and uncomment:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag_name }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: 'See the assets below for download links.'
          releaseDraft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }}

      - name: Build standalone binaries
        shell: bash
        working-directory: src-tauri
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release --bin llm-wiki-api --bin llm-wiki-ingest --target "${{ matrix.rust_target }}"
          else
            cargo build --release --bin llm-wiki-api --bin llm-wiki-ingest
          fi

      - name: Package standalone binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $rustTarget = "${{ matrix.rust_target }}"
          $targetDir = if ($rustTarget) { "src-tauri/target/$rustTarget/release" } else { "src-tauri/target/release" }
          New-Item -ItemType Directory -Force -Path dist-standalone | Out-Null
          Copy-Item "$targetDir/llm-wiki-api.exe" dist-standalone/ -ErrorAction SilentlyContinue
          Copy-Item "$targetDir/llm-wiki-ingest.exe" dist-standalone/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist-standalone/*.exe -DestinationPath dist-standalone/llm-wiki-standalone-windows.zip
          Get-ChildItem dist-standalone/

      - name: Package standalone binaries (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          TARGET_DIR="src-tauri/target/${{ matrix.rust_target }}/release"
          if [ -z "${{ matrix.rust_target }}" ]; then
            TARGET_DIR="src-tauri/target/release"
          fi
          mkdir -p dist-standalone
          cp "$TARGET_DIR/llm-wiki-api" dist-standalone/
          cp "$TARGET_DIR/llm-wiki-ingest" dist-standalone/
          OS_ID=$(echo "${{ matrix.platform }}" | sed 's/-.*//')
          tar -czf "dist-standalone/llm-wiki-standalone-${OS_ID}.tar.gz" -C dist-standalone llm-wiki-api llm-wiki-ingest
          ls -la dist-standalone/

      - name: Attach standalone binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for f in dist-standalone/llm-wiki-standalone-*; do
            [ -f "$f" ] && gh release upload "${{ steps.release_meta.outputs.tag_name }}" "$f" --clobber
          done

      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          .github/scripts/package-windows-portable.ps1 -Version $version

      - name: Attach Windows portable zip to release
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "${{ steps.release_meta.outputs.tag_name }}" dist-portable/*.zip --clobber

      # Always upload as workflow artifacts as a backup (useful for
      # `gh run download` without hunting through the Releases page).
      - name: Upload bundles as workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          # Glob covers both targeted (e.g.
          # target/aarch64-apple-darwin/release/...) and default
          # (target/release/...) build paths.
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            dist-portable/*.zip
            dist-standalone/*
          if-no-files-found: warn
          retention-days: 14

  package-extension:
    name: Package browser extension
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync extension manifest version and zip
        run: |
          APP_VERSION="${{ needs.build.outputs.app_version }}"
          node -e "
            const fs = require('fs');
            const p = 'extension/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf-8'));
            m.version = '${APP_VERSION}';
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
          mkdir -p dist-extension
          (cd extension && zip -r "../dist-extension/llm-wiki-extension-${APP_VERSION}.zip" . -x "*.DS_Store")
          ls -la dist-extension

      - name: Attach extension zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.build.outputs.tag_name }}" dist-extension/*.zip --clobber

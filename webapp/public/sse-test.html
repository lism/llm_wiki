<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>SSE Test</title></head>
<body>
<h3>SSE Test</h3>
<pre id="log" style="background:#111;color:#0f0;padding:1em;min-height:200px;white-space:pre-wrap"></pre>
<script>
const TOKEN = "GFPoWuK7kpqepXJ-m8N1gb2HeQArqvDePA1tEXUQW-I"
const URL = "http://127.0.0.1:19828/api/v1/projects/current/chat"

const log = (msg) => {
  document.getElementById("log").textContent += msg + "\n"
}

async function test() {
  log("Sending request...")
  try {
    const resp = await fetch(URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + TOKEN,
      },
      body: JSON.stringify({query:"say hi in 3 words",stream:true}),
    })
    log(`Status: ${resp.status}`)
    log(`Content-Type: ${resp.headers.get("content-type")}`)
    log(`Has body: ${!!resp.body}`)

    if (!resp.body) { log("NO BODY!"); return }

    const reader = resp.body.getReader()
    const dec = new TextDecoder()
    let buf = ""

    log("Reading stream...")
    while (true) {
      const {done, value} = await reader.read()
      if (done) { log("Stream done"); break }
      const chunk = dec.decode(value, {stream: true})
      buf += chunk
      log("CHUNK: " + JSON.stringify(chunk.slice(0,80)))
    }
    log("\n--- FULL ---\n" + buf.slice(0, 500))
  } catch(e) {
    log("ERROR: " + e.message)
  }
}
test()
</script>
</body>
</html>
